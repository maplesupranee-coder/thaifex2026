<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบบันทึกสต็อกสินค้า</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background-color: #f5f7fa; color: #333; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h2 { text-align: center; color: #2c3e50; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input[type="text"], input[type="number"] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        input[type="file"] { display: none; }
        .btn-upload { display: block; text-align: center; background-color: #34495e; color: white; padding: 10px; border-radius: 6px; cursor: pointer; font-weight: bold; margin-bottom: 10px; }
        .btn-submit { width: 100%; background-color: #2ecc71; color: white; padding: 12px; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        .btn-submit:hover { background-color: #27ae60; }
        #preview { width: 100%; max-height: 250px; object-fit: contain; display: none; margin-top: 10px; border-radius: 6px; border: 1px dashed #ccc; }
        .loading { display: none; text-align: center; font-weight: bold; color: #3498db; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>บันทึกสต็อกสินค้า</h2>
    <form id="stockForm">
        <div class="form-group">
            <label for="productName">ชื่อสินค้า / รหัสสินค้า</label>
            <input type="text" id="productName" required placeholder="กรุณากรอกชื่อหรือรหัสสินค้า">
        </div>
        
        <div class="form-group">
            <label for="quantity">จำนวน</label>
            <input type="number" id="quantity" required placeholder="กรุณากรอกจำนวน">
        </div>

        <div class="form-group">
            <label>รูปภาพประกอบ</label>
            <label for="imageFile" class="btn-upload">📸 กดถ่ายรูป หรือ เลือกรูปภาพ</label>
            <input type="file" id="imageFile" accept="image/*" capture="environment">
            <img id="preview" src="" alt="ตัวอย่างรูปภาพ">
        </div>

        <button type="submit" class="btn-submit">📤 ส่งข้อมูลเข้า Google Sheet</button>
        <div id="loadingText" class="loading">⏳ กำลังอัปโหลดรูปและบันทึกข้อมูล กรุณารอสักครู่...</div>
    </form>
</div>

<script>
    // ⚠️ วางลิงก์ Web App URL ตัวจริงที่ก๊อปปี้มาจาก Google Apps Script ในเครื่องหมายคำพูดด้านล่างนี้ครับ
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzQlOgiDgXDpN206OykcTvnvDm3dykVorHvxJr5P1FHEp8_S6oQAYnMvOXlRi6oSm4SlA/exec"; 

    const imageFileInput = document.getElementById('imageFile');
    const previewImg = document.getElementById('preview');
    let base64ImageString = "";

    // เมื่อมีการเลือกรูปหรือถ่ายรูป ให้แปลงเป็น Base64 และแสดงตัวอย่างรูป
    imageFileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(event) {
                previewImg.src = event.target.result;
                previewImg.style.display = 'block';
                base64ImageString = event.target.result; // เก็บค่า Base64 ไว้ส่งไปหลังบ้าน
            };
            reader.readAsDataURL(file);
        }
    });

    // จังหวะกดปุ่มส่งฟอร์มข้อมูล
    document.getElementById('stockForm').addEventListener('submit', function(e) {
        e.preventDefault();

        if (!WEB_APP_URL || WEB_APP_URL.includes("วางลิงก์")) {
            alert("❌ ล้มเหลว: พี่ลืมเอาลิงก์จาก Apps Script มาใส่ในโค้ดบรรทัดที่ 48 ครับ!");
            return;
        }

        const productName = document.getElementById('productName').value;
        const quantity = document.getElementById('quantity').value;
        const loadingText = document.getElementById('loadingText');

        // แสดงข้อความกำลังโหลด และปิดปุ่มส่งชั่วคราวกันกดซ้ำ
        loadingText.style.display = 'block';
        document.querySelector('.btn-submit').disabled = true;

        // จัดกลุ่มข้อมูลเตรียมยิงไปหลังบ้าน
        const payload = {
            productName: productName,
            quantity: quantity,
            image: base64ImageString
        };

        // ยิงข้อมูลข้ามท่อไปยัง Google Apps Script Web App
        fetch(WEB_APP_URL, {
            method: 'POST',
            mode: 'no-cors', // ตั้งเพื่อป้องกันปัญหาบล็อกข้ามโดเมน (CORS)
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(payload)
        })
        .then(() => {
            alert('🎉 บันทึกข้อมูลสำเร็จแล้วครับป๋ม! เช็คใน Google Sheet ได้เลยครับ');
            // ล้างฟอร์มเคลียร์ค่าเพื่อเริ่มบันทึกชิ้นใหม่
            document.getElementById('stockForm').reset();
            previewImg.style.display = 'none';
            base64ImageString = "";
        })
        .catch(error => {
            console.error('Error:', error);
            alert('❌ เกิดข้อผิดพลาดในการส่งข้อมูล กรุณาลองใหม่อีกครั้ง');
        })
        .finally(() => {
            loadingText.style.display = 'none';
            document.querySelector('.btn-submit').disabled = false;
        });
    });
</script>

</body>
</html>
